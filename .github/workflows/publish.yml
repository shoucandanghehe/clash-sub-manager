name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  Publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        name: Setup UV
        with:
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: webui/package.json
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Get Version
        id: version
        run: |
          echo "VERSION=$(uv version --short)" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Check Version
        if: steps.version.outputs.VERSION != steps.version.outputs.TAG_VERSION
        run: exit 1

      - name: Install Python dependencies
        run: uv sync

      - name: Install WebUI dependencies
        run: pnpm --dir webui install --frozen-lockfile

      - name: Build WebUI
        run: |
          pnpm --dir webui run build

      - name: Sync WebUI static assets
        run: |
          rm -rf src/clash_sub_manager/static/webui/*
          cp -a webui/dist/. src/clash_sub_manager/static/webui/

      - name: Build distributions
        run: uv build

      - name: Publish Package to PyPI
        run: uv publish

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.TAG_NAME }}" dist/*.tar.gz dist/*.whl --title "${{ steps.version.outputs.TAG_NAME }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
