name: Package

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        name: Setup UV
        with:
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: webui/package.json
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Install Python dependencies
        run: uv sync

      - name: Install WebUI dependencies
        run: pnpm --dir webui install --frozen-lockfile

      - name: Build WebUI
        run: |
          pnpm --dir webui run build

      - name: Sync WebUI static assets
        run: |
          rm -rf src/clash_sub_manager/static/webui/*
          cp -a webui/dist/. src/clash_sub_manager/static/webui/

      - name: Build distributions
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-artifacts
          path: dist/
